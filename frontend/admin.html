<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BistekPrinter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <img src="logo-bistek.png" alt="Bistek" class="logo-img">
                </div>
                <nav class="header-nav" style="display: flex; align-items: center; gap: 1rem;">
                    <a href="index.html" class="nav-link">🏷️ Impressão</a>
                    <a href="stats.html" class="nav-link">📊 Estatísticas</a>
                    <button class="btn btn-small btn-danger"
                        onclick="localStorage.removeItem('adminToken'); window.location.href='login.html'"
                        style="margin-left: 1rem;">Sair</button>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <!-- Seletor de Impressora -->
            <section class="admin-section">
                <h2 class="section-title">Selecionar Impressora</h2>
                <div class="card">
                    <div class="form-group">
                        <label for="printerAdminSelect" class="form-label">Impressora da Loja</label>
                        <select id="printerAdminSelect" class="form-select">
                            <!-- Preenchido via JS -->
                        </select>
                    </div>
                </div>
            </section>

            <!-- Configuração de LS -->
            <section class="admin-section">
                <h2 class="section-title">Configurar Funções e Margem (LS)</h2>
                <div class="card">
                    <form id="lsForm" class="admin-form">
                        <div class="form-group" style="width: 100%; margin-bottom: 1rem;">
                            <label for="editFuncao" class="form-label">Funções Habilitadas (Segure CTRL para
                                múltiplos)</label>
                            <select id="editFuncao" class="form-select" multiple>
                                <!-- Preenchido via JS baseado nos modos do servidor -->
                            </select>
                        </div>
                        <div class="form-row" id="lsInputsContainer" style="flex-wrap: wrap;">
                            <!-- Preenchido via JS de acordo com os Modos da Loja -->
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">💾 Salvar
                            Configurações</button>
                    </form>
                </div>
            </section>

            <!-- Lista de Impressoras -->
            <section class="admin-section">
                <h2 class="section-title">Impressoras Cadastradas</h2>
                <div class="card">
                    <div class="table-container">
                        <table class="admin-table" id="printersTable">
                            <thead>
                                <tr>
                                    <th>Loja</th>
                                    <th>Nome</th>
                                    <th>Função</th>
                                    <th>Margens (LS)</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="printersTableBody">
                                <!-- Preenchido via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Adicionar Impressora -->
            <section class="admin-section">
                <h2 class="section-title">Adicionar Impressora</h2>
                <div class="card">
                    <form id="addPrinterForm" class="admin-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="newLoja" class="form-label">Loja</label>
                                <input type="number" id="newLoja" class="form-input" min="1" max="99" required>
                            </div>
                            <div class="form-group">
                                <label for="newNome" class="form-label">Nome</label>
                                <input type="text" id="newNome" class="form-input" placeholder="Ex: Frente de Caixa"
                                    required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="newIp" class="form-label">IP da Impressora</label>
                                <input type="text" id="newIp" class="form-input" placeholder="Ex: 10.4.30.116" required>
                            </div>
                            <div class="form-group" style="width: 100%;">
                                <label for="newFuncao" class="form-label">Função (Segure CTRL para múltiplos)</label>
                                <select id="newFuncao" class="form-select" multiple>
                                    <!-- Preenchido via JS baseado nos modos do servidor -->
                                </select>
                            </div>
                        </div>
                        <div class="form-row" id="newLsInputsContainer" style="flex-wrap: wrap;">
                            <!-- Preenchido via JS com inputs LS dinâmicos -->
                        </div>
                        <button type="submit" class="btn btn-primary">➕ Adicionar Impressora</button>
                    </form>
                </div>
            </section>
        </main>

        <div class="toast-container" id="toastContainer"></div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
