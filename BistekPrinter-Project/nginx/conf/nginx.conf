worker_processes  1;

events {
    worker_connections  1024;
}

http {
    client_body_temp_path  temp/client_body_temp;
    proxy_temp_path        temp/proxy_temp;
    fastcgi_temp_path      temp/fastcgi_temp;
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # SERVIDOR HTTPS (Cadeado Verde)
    server {
        listen       443 ssl;
        server_name  REPLACE_ME_IP localhost;

        # Paths limpos, sem prefixo /certs/
        ssl_certificate      "certificate.crt";
        ssl_certificate_key  "private.key";

        # --- REDIRECIONAMENTO DE SEGURANÇA ---
        location = / {
            return 301 https://$host/frontend/;
        }

        # --- ROTA DO FRONTEND ---
        location /frontend/ {
            proxy_pass http://127.0.0.1:8000/frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- ROTA DA API ---
        location /search {
            proxy_pass http://127.0.0.1:8000/search;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Redirecionamento de HTTP para HTTPS (IP agora é dinâmico)
    server {
        listen 80;
        server_name REPLACE_ME_IP localhost;
        return 301 https://$host$request_uri;
    }
}